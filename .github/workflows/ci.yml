name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------
  # Lint & Type Check
  # ---------------------------------------------------------------
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install linting tools
        run: |
          pip install ruff mypy types-requests types-PyYAML

      - name: Run ruff
        run: |
          ruff check .

      - name: Run mypy
        run: |
          mypy api_server.py run.py src/ --ignore-missing-imports --no-error-summary

  # ---------------------------------------------------------------
  # Test
  # ---------------------------------------------------------------
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run pytest
        run: |
          python -m pytest tests/ -v --tb=short --cov=src --cov=api_server --cov-report=term-missing --cov-report=xml --cov-fail-under=50
        env:
          # Disable Docker for sandbox tests in CI (no daemon available)
          DOCKER_CLIENT_TIMEOUT: 1

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  # ---------------------------------------------------------------
  # Frontend Build
  # ---------------------------------------------------------------
  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend && npm ci

      - name: TypeScript check
        run: |
          cd frontend && npx tsc --noEmit

      - name: Build
        run: |
          cd frontend && npm run build

  # ---------------------------------------------------------------
  # Security audit
  # ---------------------------------------------------------------
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit
        run: |
          pip-audit -r requirements.txt || true
